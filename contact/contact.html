<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Open+Sans:ital,wght@0,400;0,600;1,400&display=swap">
  <link rel="stylesheet" href="contact.css">
  <title>Contact | FreeLivingDesigns</title>
</head>
<body>
  <!-- ASSIGNMENT 7: Vue Contact Form with Validation and Modal -->
  <!-- Demonstrates: Vue components, v-model binding, v-if conditionals, responsive validation, modal interaction -->
  
  <div id="app">
    <main class="contact-page" aria-labelledby="contact-heading">
      <a class="back-link" id="back-link" href="../index.html">Back to Portfolio</a>
      
      <!-- COMPONENT 1: Contact Form (Reusable with Props) -->
      <!-- Props: heading, introText, buttonLabel, placeholders, labels, helpers -->
      <!-- Uses: v-model for name/email/message; @input/@blur for real-time validation; :disabled for submit button -->
      <!-- Emits: form-submit event with validated { name, email, message } payload -->
      <contact-form 
        heading="Contact Form"
        intro-text="Send me a message and I will get back to you soon."
        button-label="Submit"
        :placeholders="formPlaceholders"
        :labels="formLabels"
        :helpers="formHelpers"
        @form-submit="handleFormSubmit">
      </contact-form>

      <!-- COMPONENT 2: Submission Modal (Reusable) -->
      <!-- Props: isOpen (controls v-if visibility), submittedData (displays name, email, message) -->
      <!-- Features: Close via button, Escape key, or backdrop click -->
      <!-- Emits: close event to parent app -->
      <submission-modal 
        v-bind:is-open="isModalOpen"
        v-bind:submitted-data="submittedData"
        @close="closeModal">
      </submission-modal>
    </main>
  </div>

  <!-- Vue 3 Global Build from CDN -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <!-- Application entry point: validators, components, app state, event handlers -->
  <script src="contactscript.js"></script>
</body>
</html>
